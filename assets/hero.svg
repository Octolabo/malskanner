  <!-- finding 1 -->
  <text x="24" y="164" font-size="14"><tspan fill="#f85149" font-weight="bold">CRITICAL</tspan><tspan fill="#e6edf3">  Invisible Unicode-tag smuggled instruction</tspan></text>
